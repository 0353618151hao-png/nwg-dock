name: Build nwg-dock for Resolute Raccoon
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libcairo2-dev \
            libgirepository1.0-dev \
            libwayland-dev \
            libglib2.0-dev \
            libpulse-dev

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build binary
        run: |
          go mod tidy
          # -s -w giúp nén file nhỏ lại cho máy Lenovo 80MH đỡ nặng
          go build -v -ldflags="-s -w" -o nwg-dock-raccoon main.go

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: my-nwg-dock-raccoon
          path: nwg-dock-raccoon
